<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta 
name="viewport" 
content="width=device-width, initial-scale=1.0">

<title>Kolkata Traffic AI</title>


<!-- Leaflet CSS -->

<link 
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>


<!-- Custom CSS -->

<link 
rel="stylesheet"
href="/static/styles.css"
/>


</head>


<body>


<!-- ============================
     Floating Search Card
============================= -->


<div class="topbar">


    <div class="logo">

        🚦 Kolkata 
        <span class="logo-dot">
            Traffic
        </span>
        AI

    </div>




    <div class="inputs-wrap">

        <!-- Mode tabs -->
        <div class="mode-tabs">
            <button class="mode-tab active" data-mode="drive"  onclick="setMode('drive')" title="Drive">🚗 Drive</button>
            <button class="mode-tab"        data-mode="walk"   onclick="setMode('walk')"  title="Walk">🚶 Walk</button>
            <button class="mode-tab"        data-mode="bike"   onclick="setMode('bike')"  title="Bike">🚲 Bike</button>
            <button class="mode-tab"        data-mode="metro"  onclick="setMode('metro')" title="Metro">🚇 Metro</button>
        </div>

        <!-- Source -->

        <div class="input-group">


            <span class="dot dot-src"></span>


            <select id="src-sel">


                <option value="">
                    Select Source
                </option>


            </select>



        </div>





        <!-- Swap -->


        <div 
        class="swap-icon"
        onclick="swapLocations()">

            ⇅

        </div>






        <!-- Destination -->

        <div class="input-group">


            <span class="dot dot-dst"></span>


            <select id="dst-sel">


                <option value="">
                    Select Destination
                </option>


            </select>



        </div>







        <!-- Button -->


        <button
        class="btn-go"
        id="btn-go"
        onclick="go()">


            Get Routes


        </button>




    </div>



</div>






<!-- ============================
              Map
============================= -->


<div id="map"></div>







<!-- ============================
       Floating Route Panel
============================= -->



<div class="body">


    <div class="panel">


        <div
        class="panel-inner"
        id="panel">



            <div class="empty-state">


                <div class="icon">

                    🗺️

                </div>



                <p>

                Choose your start and end points.
                <br>

                AI traffic routes appear here.

                </p>



            </div>




        </div>



    </div>


</div>








<!-- ============================
        Bottom Status Card
============================= -->


<div class="statusbar">


    <div id="status-l">

        Ready

    </div>


    <div>

        Kolkata Traffic AI

    </div>



</div>








<!-- Map overlay legend (metro lines) -->
<div class="map-legend" id="map-legend">
    <div class="legend-title">Metro Lines</div>
    <div class="legend-row"><div class="legend-line" style="background:#2196F3"></div> Blue Line</div>
    <div class="legend-row"><div class="legend-line" style="background:#4CAF50"></div> Green Line</div>
    <div class="legend-row"><div class="legend-dot" style="background:#9c27b0;border:2px solid #fff;box-shadow:0 0 0 1px #9c27b0"></div> Station</div>
</div>

<!-- Toast -->


<div 
class="toast"
id="toast">

</div>









<!-- Leaflet JS -->


<script
src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>




<!-- Custom JS -->


<script src="/static/scripts.js"></script>



</body>


</html>
