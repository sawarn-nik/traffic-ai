<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kolkata Traffic AI</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#eee;height:100vh;display:flex;flex-direction:column;overflow:hidden}

    /* ── Top bar ── */
    .topbar{background:#16213e;padding:10px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #0f3460;flex-shrink:0;z-index:1000}
    .logo{font-size:17px;font-weight:700;color:#4fc3f7;white-space:nowrap}
    .logo span{color:#e74c3c}
    .search-row{display:flex;gap:8px;flex:1;align-items:center}
    .search-row select{flex:1;padding:7px 10px;border-radius:8px;border:1px solid #0f3460;background:#0f3460;color:#eee;font-size:13px;cursor:pointer;min-width:0}
    .search-row select:focus{outline:none;border-color:#4fc3f7}
    .arrow{color:#4fc3f7;font-size:16px;flex-shrink:0}
    .btn-go{padding:7px 18px;background:#4fc3f7;color:#1a1a2e;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;transition:background .2s;flex-shrink:0}
    .btn-go:hover{background:#81d4fa}
    .btn-go:disabled{background:#444;color:#777;cursor:not-allowed}

    /* ── Layout ── */
    .main{display:flex;flex:1;overflow:hidden}

    /* ── Left panel ── */
    .panel{width:340px;background:#16213e;border-right:1px solid #0f3460;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
    .panel-scroll{overflow-y:auto;flex:1;padding:10px}
    .panel-scroll::-webkit-scrollbar{width:3px}
    .panel-scroll::-webkit-scrollbar-thumb{background:#0f3460;border-radius:2px}

    /* ── States ── */
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:280px;gap:10px;color:#555;text-align:center;padding:20px}
    .empty-state .icon{font-size:44px}
    .empty-state p{font-size:13px;line-height:1.5}

    .loading-row{display:flex;align-items:center;gap:10px;padding:10px 0;color:#888;font-size:13px}
    .spinner{width:18px;height:18px;border:2px solid #0f3460;border-top-color:#4fc3f7;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Section header ── */
    .sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#4fc3f7;padding:8px 0 5px;border-bottom:1px solid #0f3460;margin-bottom:7px;margin-top:4px}

    /* ── Route cards ── */
    .route-card{background:#0f3460;border-radius:10px;padding:11px 13px;margin-bottom:7px;cursor:pointer;border:2px solid transparent;transition:border-color .15s,background .15s;position:relative}
    .route-card:hover{background:#1a4a7a}
    .route-card.active{border-color:#4fc3f7;background:#1a4a7a}
    .route-card.best{border-color:#27ae60}
    .route-card.best.active{border-color:#4fc3f7}
    .best-badge{position:absolute;top:-8px;right:10px;background:#27ae60;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.4px}
    .rc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
    .rc-label{font-weight:700;font-size:14px;color:#eee}
    .risk-pill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase}
    .rc-stats{display:flex;gap:14px;margin-bottom:6px}
    .stat-val{font-size:17px;font-weight:700;color:#4fc3f7}
    .stat-lbl{font-size:10px;color:#888;text-transform:uppercase}
    .rc-roads{font-size:11px;color:#aaa;line-height:1.5}
    .rc-evts{margin-top:5px;font-size:12px}
    .rc-evts.warn{color:#f39c12}
    .rc-evts.ok{color:#27ae60}

    /* ── Disruption items ── */
    .ev-item{background:#0f3460;border-radius:7px;padding:9px 11px;margin-bottom:5px;border-left:3px solid #555}
    .ev-item.high{border-left-color:#e74c3c}
    .ev-item.medium{border-left-color:#f39c12}
    .ev-item.low{border-left-color:#27ae60}
    .ev-head{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:3px}
    .ev-type{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
    .ev-age{font-size:11px;color:#888;white-space:nowrap;flex-shrink:0}
    .ev-loc{font-size:12px;color:#eee;margin-bottom:2px}
    .ev-reason{font-size:11px;color:#aaa;line-height:1.4}
    .ev-meta{margin-top:3px;font-size:10px;color:#555;display:flex;gap:8px;flex-wrap:wrap}
    .ev-meta .live{color:#4fc3f7}
    .future-tag{display:inline-block;background:#8e44ad;color:#fff;font-size:9px;padding:1px 5px;border-radius:6px;margin-left:3px}

    /* ── Map ── */
    #map{flex:1;z-index:1}

    /* ── Status bar ── */
    .statusbar{background:#0f3460;padding:5px 14px;font-size:11px;color:#777;flex-shrink:0;display:flex;justify-content:space-between;gap:8px}
    #status-l{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .statusbar span{color:#4fc3f7}

    /* ── Progress bar for disruptions loading ── */
    .progress-bar{height:3px;background:#0f3460;border-radius:0;overflow:hidden;flex-shrink:0}
    .progress-fill{height:100%;background:linear-gradient(90deg,#4fc3f7,#81d4fa);width:0%;transition:width .4s;border-radius:0}
    .progress-fill.indeterminate{animation:progress-anim 1.4s ease-in-out infinite}
    @keyframes progress-anim{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}

    /* ── Toast ── */
    .toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);background:#e74c3c;color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;z-index:9999;display:none;max-width:380px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.4)}
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">🚦 Kolkata <span>Traffic</span> AI</div>
  <div class="search-row">
    <select id="src-sel"><option value="">— Source —</option></select>
    <span class="arrow">→</span>
    <select id="dst-sel"><option value="">— Destination —</option></select>
    <button class="btn-go" id="btn-go" onclick="go()">Get Routes</button>
  </div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

<div class="main">
  <div class="panel">
    <div class="panel-scroll" id="panel">
      <div class="empty-state">
        <div class="icon">🗺️</div>
        <p>Select source and destination above.<br>Routes appear instantly — disruption analysis loads in the background.</p>
      </div>
    </div>
  </div>
  <div id="map"></div>
</div>

<div class="statusbar">
  <div id="status-l">Ready</div>
  <div>Kolkata Traffic AI — Layer 1</div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Map ───────────────────────────────────────────────────────────────────────
const map = L.map('map',{center:[22.5726,88.3639],zoom:13,zoomControl:true});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:19
}).addTo(map);

// ── State ─────────────────────────────────────────────────────────────────────
let routeLayers=[], pinLayers=[], markerLayers=[];
let currentRoutes=[], activeIdx=0;
let disruptionsLoaded=false;

// ── Locations ─────────────────────────────────────────────────────────────────
async function loadLocations(){
  try{
    const d=await (await fetch('/api/locations')).json();
    ['src-sel','dst-sel'].forEach(id=>{
      const sel=document.getElementById(id);
      d.locations.forEach(l=>{
        sel.appendChild(new Option(`${l.name} — ${l.desc}`,l.name));
      });
    });
  }catch(e){toast('Failed to load locations');}
}

// ── Main entry ────────────────────────────────────────────────────────────────
async function go(){
  const src=document.getElementById('src-sel').value;
  const dst=document.getElementById('dst-sel').value;
  if(!src||!dst){toast('Select both source and destination');return;}
  if(src===dst){toast('Source and destination must be different');return;}

  setBtn(true,'Loading…');
  setStatus('Computing routes…');
  setProgress('indeterminate');
  clearMap();
  disruptionsLoaded=false;

  showPanel(`<div class="loading-row"><div class="spinner"></div>Computing routes on Kolkata road network…</div>`);

  // ── Step 1: routes only (fast ~2s) ──────────────────────────────────────
  let routeData;
  try{
    const r=await fetch('/api/route',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({source:src,destination:dst})});
    if(!r.ok){const e=await r.json();throw new Error(e.detail||'Routing failed');}
    routeData=await r.json();
  }catch(e){
    toast(e.message); setStatus('Error: '+e.message);
    showPanel(`<div class="empty-state"><div class="icon">⚠️</div><p>${e.message}</p></div>`);
    setBtn(false,'Get Routes'); setProgress('off'); return;
  }

  currentRoutes=routeData.routes;
  activeIdx=routeData.routes.findIndex(r=>r.is_best);
  if(activeIdx<0)activeIdx=0;

  // Draw routes immediately
  drawRoutes(routeData);
  renderCards(routeData.routes, [], false);
  setStatus(`${src} → ${dst} | ${routeData.routes.length} routes | Fetching disruptions…`);
  setBtn(false,'Get Routes');

  // ── Step 2: disruptions (slow ~30-60s) — non-blocking ───────────────────
  setProgress('indeterminate');
  const allRoads=routeData.all_road_names||[];

  try{
    const r2=await fetch('/api/disruptions',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        source:src, destination:dst,
        road_names:allRoads,
        routes:routeData.routes
      })
    });
    if(!r2.ok){const e=await r2.json();throw new Error(e.detail||'Disruption fetch failed');}
    const dispData=await r2.json();

    // Merge disruption scores back into route layers
    currentRoutes=dispData.routes||currentRoutes;
    activeIdx=dispData.routes?(dispData.routes.findIndex(r=>r.is_best)||0):activeIdx;
    disruptionsLoaded=true;

    // Update route colours
    updateRouteColors(dispData.routes);
    renderCards(dispData.routes, dispData.markers||[], true);
    drawMarkers(dispData.markers||[]);
    setStatus(`${src} → ${dst} | ${dispData.routes.length} routes | `+
              `${dispData.recent_events||0} disruptions | ${(dispData.generated_at||'').slice(0,19)}Z`);
    setProgress('off');
  }catch(e){
    toast('Disruption analysis failed: '+e.message);
    setProgress('off');
    setStatus(`${src} → ${dst} | Routes shown (disruption analysis failed)`);
  }
}

// ── Draw routes ───────────────────────────────────────────────────────────────
function drawRoutes(data){
  clearMap();
  const styles=[{w:7,o:.95},{w:5,o:.55,dash:'10,7'},{w:5,o:.45,dash:'6,9'}];

  data.routes.forEach((route,i)=>{
    const s=styles[i]||styles[2];
    const color=route.risk_color||'#27ae60';
    const layer=L.geoJSON(route.geojson,{
      style:{color,weight:s.w,opacity:s.o,dashArray:s.dash||null,lineJoin:'round'}
    }).addTo(map);
    layer.on('click',()=>selectRoute(i));
    layer.bindTooltip(`<b>${route.label}</b><br>${route.distance_km} km · ${route.travel_time_min} min`,{sticky:true});
    routeLayers.push(layer);
  });

  // Src/dst pins
  const sc=data.src_coords, dc=data.dst_coords;
  if(sc) pinLayers.push(L.marker([sc[0],sc[1]],{icon:pin('🟢')}).addTo(map).bindPopup(`<b>Start</b><br>${data.source}`));
  if(dc) pinLayers.push(L.marker([dc[0],dc[1]],{icon:pin('🔴')}).addTo(map).bindPopup(`<b>End</b><br>${data.destination}`));

  // Fit to best route
  if(routeLayers[activeIdx]) map.fitBounds(routeLayers[activeIdx].getBounds(),{padding:[40,40]});
  highlightRoute(activeIdx);
}

function updateRouteColors(routes){
  routes.forEach((route,i)=>{
    if(routeLayers[i]){
      const isActive=(i===activeIdx);
      routeLayers[i].setStyle({
        color:route.risk_color||'#27ae60',
        weight:isActive?7:4,
        opacity:isActive?1.0:0.45,
        dashArray:isActive?null:'8,6'
      });
    }
  });
  if(routeLayers[activeIdx]) routeLayers[activeIdx].bringToFront();
}

function drawMarkers(markers){
  markerLayers.forEach(l=>map.removeLayer(l));
  markerLayers=[];
  markers.forEach(m=>{
    if(m.lat&&m.lon){
      const mk=L.circleMarker([m.lat,m.lon],{
        radius:7,color:'#fff',weight:1.5,
        fillColor:m.color||'#888',fillOpacity:.9
      }).addTo(map);
      mk.bindPopup(`<b>${m.event_type.replace('_',' ').toUpperCase()}</b><br>`+
                   `📍 ${m.location}<br>${m.reason}<br>`+
                   `<small>${m.age_label} · ${m.source}</small>`);
      markerLayers.push(mk);
    }
  });
}

// ── Panel rendering ───────────────────────────────────────────────────────────
function renderCards(routes, markers, disruptionsReady){
  let html='';

  // Route cards
  html+=`<div class="sec">Routes (${routes.length})${!disruptionsReady?' <span style="color:#888;font-weight:normal;text-transform:none;font-size:11px">— analysing disruptions…</span>':''}</div>`;
  routes.forEach((r,i)=>{
    const isActive=(i===activeIdx), isBest=r.is_best;
    const riskColor=r.risk_color||'#27ae60';
    const riskLevel=r.risk_level||'—';
    const evtCount=r.event_count||0;
    html+=`
    <div class="route-card ${isActive?'active':''} ${isBest?'best':''}" id="rc-${i}" onclick="selectRoute(${i})">
      ${isBest?'<div class="best-badge">✓ Best</div>':''}
      <div class="rc-head">
        <span class="rc-label">${r.label}</span>
        <span class="risk-pill" style="background:${riskColor}22;color:${riskColor}">${riskLevel}</span>
      </div>
      <div class="rc-stats">
        <div><div class="stat-val">${r.travel_time_min}</div><div class="stat-lbl">min</div></div>
        <div><div class="stat-val">${r.distance_km}</div><div class="stat-lbl">km</div></div>
        <div><div class="stat-val" style="color:${riskColor}">${r.risk_score||0}</div><div class="stat-lbl">risk</div></div>
      </div>
      <div class="rc-roads">
  ${(r.road_names||[]).slice(0,4).join(' · ')}
</div>

${
r.weather ?
`
<div style="
  margin-top:8px;
  padding:6px;
  background:#16213e;
  border-radius:6px;
  font-size:11px;
  color:#ddd;
">
  🌦 Weather Risk: <b>${r.weather.avg_wsi ?? "N/A"}</b><br>
  ⚠ Severity: <b>${(r.weather.severity || "unknown").toUpperCase()}</b><br>
  📍 Sample Points: <b>${r.weather.sample_points ?? 0}</b>
</div>
`
:
''
}

<div class="rc-evts ${evtCount?'warn':'ok'}">
        ${!disruptionsReady?'<span style="color:#555">⏳ Analysing…</span>':evtCount?`⚠ ${evtCount} disruption${evtCount>1?'s':''}`:'✓ No disruptions'}
      </div>
    </div>`;
  });

  // Disruptions for active route
  const activeRoute=routes[activeIdx];
  const evts=(activeRoute&&activeRoute.matched_events)||[];

  if(disruptionsReady){
    html+=`<div class="sec" style="margin-top:10px">Disruptions on this route (${evts.length})</div>`;
    if(evts.length===0){
      html+=`<div style="color:#27ae60;font-size:12px;padding:6px 0">✓ No disruptions detected on this route</div>`;
    } else {
      evts.forEach(ev=>{
        const future=ev.is_future_event?'<span class="future-tag">Upcoming</span>':'';
        const isLive=ev.source==='tomtom_traffic';
        const delay=ev.delay_min?` · ~${ev.delay_min} min delay`:'';
        const dur=ev.impact_duration_label?` · ${ev.impact_duration_label}`:'';
        html+=`
        <div class="ev-item ${ev.severity}">
          <div class="ev-head">
            <span class="ev-type" style="color:${ev.color||'#888'}">${ev.event_type.replace('_',' ')}${future}</span>
            <span class="ev-age">${ev.age_label||''}</span>
          </div>
          <div class="ev-loc">📍 ${ev.location}</div>
          <div class="ev-reason">${ev.reason}${delay}</div>
          <div class="ev-meta">
            <span class="${isLive?'live':''}">${isLive?'📡 TomTom Live':ev.source==='newsapi'?'📰 NewsAPI':'📡 RSS'}</span>
            ${dur?`<span>${dur}</span>`:''}
          </div>
        </div>`;
      });
    }

    // Other city events
    const allEvts=markers.filter(m=>!evts.some(e=>e.location===m.location&&e.reason===m.reason));
    if(allEvts.length>0){
      html+=`<div class="sec" style="margin-top:10px">Other Kolkata disruptions (${allEvts.length})</div>`;
      allEvts.slice(0,4).forEach(ev=>{
        html+=`
        <div class="ev-item ${ev.severity}">
          <div class="ev-head">
            <span class="ev-type" style="color:${ev.color||'#888'}">${ev.event_type.replace('_',' ')}</span>
            <span class="ev-age">${ev.age_label||''}</span>
          </div>
          <div class="ev-loc">📍 ${ev.location}</div>
          <div class="ev-reason">${ev.reason}</div>
        </div>`;
      });
    }
  } else {
    html+=`<div class="sec" style="margin-top:10px">Disruption Analysis</div>`;
    html+=`<div class="loading-row"><div class="spinner"></div>Fetching news, TomTom & running LLM analysis…<br><small style="color:#555">~30–60 seconds</small></div>`;
  }

  document.getElementById('panel').innerHTML=html;
}

// ── Route selection ───────────────────────────────────────────────────────────
function selectRoute(i){
  activeIdx=i;
  highlightRoute(i);
  document.querySelectorAll('.route-card').forEach((c,j)=>c.classList.toggle('active',j===i));
  if(routeLayers[i]) map.fitBounds(routeLayers[i].getBounds(),{padding:[40,40]});
  // Re-render panel with new active route
  const allMarkers=markerLayers.map(()=>({})); // placeholder, full re-render uses stored data
  renderCards(currentRoutes,
    currentRoutes.flatMap(r=>(r.matched_events||[])),
    disruptionsLoaded);
}

function highlightRoute(idx){
  routeLayers.forEach((l,i)=>{
    const r=currentRoutes[i];
    if(!r)return;
    const active=(i===idx);
    l.setStyle({
      color:r.risk_color||'#27ae60',
      weight:active?7:4,
      opacity:active?1.0:0.4,
      dashArray:active?null:'8,6'
    });
    if(active)l.bringToFront();
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function clearMap(){
  [...routeLayers,...pinLayers,...markerLayers].forEach(l=>map.removeLayer(l));
  routeLayers=[];pinLayers=[];markerLayers=[];
}
function pin(emoji){
  return L.divIcon({html:`<div style="font-size:22px;line-height:1">${emoji}</div>`,className:'',iconSize:[26,26],iconAnchor:[13,13]});
}
function showPanel(html){document.getElementById('panel').innerHTML=html;}
function setBtn(disabled,text){const b=document.getElementById('btn-go');b.disabled=disabled;b.textContent=text;}
function setStatus(msg){document.getElementById('status-l').textContent=msg;}
function setProgress(state){
  const f=document.getElementById('progress');
  if(state==='indeterminate'){f.style.width='';f.classList.add('indeterminate');}
  else if(state==='off'){f.classList.remove('indeterminate');f.style.width='0%';}
  else{f.classList.remove('indeterminate');f.style.width=state+'%';}
}
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',4000);
}

loadLocations();
</script>
</body>
</html>
