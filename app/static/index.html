<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kolkata Traffic AI</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/static/styles.css?v=6" />
</head>
<body>

  <!-- ── Full-screen map ───────────────────────── -->
  <div id="map"></div>

  <!-- ── Floating UI layer ─────────────────────── -->
  <div class="body">

    <!-- Search card — top-left -->
    <div class="topbar">
      <div class="logo">Kolkata <span class="logo-dot">Traffic</span> AI</div>

      <div class="inputs-wrap">

        <!-- Mode tabs -->
        <div class="mode-tabs">
          <button class="mode-tab active" data-mode="drive"       onclick="setMode('drive')"       title="Drive">Drive</button>
          <button class="mode-tab"        data-mode="walk"        onclick="setMode('walk')"        title="Walk">Walk</button>
          <button class="mode-tab"        data-mode="bike"        onclick="setMode('bike')"        title="Bike">Bike</button>
          <button class="mode-tab"        data-mode="metro"       onclick="setMode('metro')"       title="Metro">Metro</button>
          <button class="mode-tab"        data-mode="metro+walk"  onclick="setMode('metro+walk')"  title="Metro + Walk">W+M</button>
          <button class="mode-tab"        data-mode="metro+bike"  onclick="setMode('metro+bike')"  title="Metro + Bike">M+B</button>
          <button class="mode-tab"        data-mode="metro+drive" onclick="setMode('metro+drive')" title="Metro + Drive">M+D</button>
        </div>

        <!-- Source -->
        <div class="input-group" id="src-wrap">
          <span class="dot dot-src"></span>
          <input type="text" id="src-input" class="loc-input" placeholder="Source" autocomplete="off"
                 oninput="filterDropdown('src')" onfocus="openDropdown('src')" onblur="closeDropdown('src', 200)">
          <div class="loc-dropdown" id="src-dropdown"></div>
        </div>

        <!-- Swap -->
        <div class="swap-icon" onclick="swapLocations()">⇅</div>

        <!-- Destination -->
        <div class="input-group" id="dst-wrap">
          <span class="dot dot-dst"></span>
          <input type="text" id="dst-input" class="loc-input" placeholder="Destination" autocomplete="off"
                 oninput="filterDropdown('dst')" onfocus="openDropdown('dst')" onblur="closeDropdown('dst', 200)">
          <div class="loc-dropdown" id="dst-dropdown"></div>
        </div>

        <button class="btn-go" id="btn-go" onclick="go()">Get Routes</button>

      </div>
    </div><!-- /.topbar -->

    <!-- Route panel — right side, full height -->
    <div class="panel">
      <div class="panel-inner" id="panel">
        <div class="empty-state">
          <div class="icon">🗺️</div>
          <p>Choose your start and end points.<br>AI traffic routes appear here.</p>
        </div>
      </div>
    </div>

  </div><!-- /.body -->

  <!-- Status bar — bottom centre -->
  <div class="statusbar">
    <div id="status-l">Ready</div>
    <div>Kolkata Traffic AI</div>
  </div>

  <!-- Metro legend — bottom left -->
  <div class="map-legend" id="map-legend">
    <div class="legend-title">Metro Lines</div>
    <div class="legend-row"><div class="legend-line" style="background:#2196F3"></div> Blue (N-S)</div>
    <div class="legend-row"><div class="legend-line" style="background:#4CAF50"></div> Green (E-W)</div>
    <div class="legend-row"><div class="legend-line" style="background:#9C27B0"></div> Purple (Joka)</div>
    <div class="legend-row"><div class="legend-line" style="background:#FF9800"></div> Orange</div>
    <div class="legend-row"><div class="legend-line" style="background:#FFC107"></div> Yellow (Airport)</div>
    <div class="legend-row"><div class="legend-dot" style="background:#555;border:2px solid #fff;box-shadow:0 0 0 1px #555"></div> Station</div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/scripts.js?v=5"></script>

</body>
</html>
